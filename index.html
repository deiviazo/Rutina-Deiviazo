<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-title" content="Deiviazo"/>
<link rel="manifest" href="./manifest.webmanifest"/>
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png"/>
<title>Rutina Deiviazo</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:radial-gradient(circle at 18% -10%,rgba(255,140,0,.18),transparent 28rem),radial-gradient(circle at 92% 12%,rgba(167,139,250,.14),transparent 24rem),linear-gradient(180deg,#11141d 0%,#0b0d12 100%);color:#fff;font-family:'Trebuchet MS',Tahoma,Geneva,sans-serif;min-height:100vh;padding-bottom:40px;}
  input,select,button{font-family:inherit;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  input::placeholder{color:#c8cdd8;opacity:0.5;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#0f1117;}
  ::-webkit-scrollbar-thumb{background:#3d4459;border-radius:2px;}
  @keyframes softFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes expandIn{from{opacity:0;transform:translateY(-8px);max-height:0;}to{opacity:1;transform:translateY(0);max-height:900px;}}
  @keyframes sheetBackdrop{from{opacity:0;}to{opacity:1;}}
  @keyframes sheetUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
  @keyframes savedPop{0%{transform:scale(.96);box-shadow:0 0 0 rgba(52,211,153,0);}45%{transform:scale(1.02);box-shadow:0 0 26px rgba(52,211,153,.35);}100%{transform:scale(1);box-shadow:0 0 0 rgba(52,211,153,0);}}
  .view-fade{animation:softFade .22s ease-out both;}
  .exercise-card{animation:softFade .18s ease-out both;will-change:transform,opacity;}
  .exercise-card:active{transform:scale(.995);}
  .expand-panel{animation:expandIn .22s ease-out both;overflow:hidden;}
  .sheet-overlay{animation:sheetBackdrop .18s ease-out both;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .bottom-sheet{animation:sheetUp .28s cubic-bezier(.2,.85,.25,1) both;}
  .saved-flash{animation:savedPop .55s ease-out both;}
  .tab-tap:active{transform:scale(.97);}
  .app-header{box-shadow:0 14px 40px rgba(0,0,0,.24);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  .glass-card{background:linear-gradient(180deg,rgba(30,35,51,.94),rgba(18,22,32,.94))!important;box-shadow:0 16px 42px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.04);}
  .premium-card{box-shadow:0 14px 36px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.04);}
  .soft-chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.045);border:1px solid rgba(200,205,216,.12);}
  .primary-action{box-shadow:0 10px 26px rgba(0,0,0,.2);transition:transform .16s ease,box-shadow .16s ease,filter .16s ease;}
  .primary-action:active{transform:scale(.985);filter:brightness(1.08);}
  .record-card{position:relative;overflow:hidden;}
  .record-card:before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,#a78bfa,transparent);}
  .session-card{transition:transform .16s ease,border-color .18s ease,box-shadow .18s ease;}
  .session-card:active{transform:scale(.992);}
  .metric-box{box-shadow:inset 0 1px 0 rgba(255,255,255,.04);}
  .save-button{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.01))!important;}
  @media (prefers-reduced-motion:reduce){
    .view-fade,.exercise-card,.expand-panel,.sheet-overlay,.bottom-sheet,.saved-flash{animation:none!important;}
  }
</style>
</head>

function loadFromStorage() {
  try {

    const h = localStorage.getItem("deiviazo-v1-history");
    if (s) state.storage = JSON.parse(s);
    if (h) state.history = JSON.parse(h);
  } catch(e) {}
}

function saveToStorage() {
  try {
    localStorage.setItem("deiviazo-v1-storage", JSON.stringify(state.storage));
    state.autoSaved = true;
    setTimeout(() => {
      state.autoSaved = false;
      if (!state.editSet) render();

}

function saveHistoryToStorage() {

function exportBackup() {
  const backup = {
    app: "rutina-lucia-gil",
    version: 1,
    exportedAt: new Date().toISOString(),
    storage: state.storage,
    history: state.history,
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `rutina-lucia-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackupFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const backup = JSON.parse(String(reader.result || ""));
      if (!backup || typeof backup !== "object" || typeof backup.storage !== "object" || !Array.isArray(backup.history)) {
        alert("El archivo no parece una copia válida de esta app.");
        return;
      }
      if (!confirm("Importar esta copia reemplazará los datos actuales de este dispositivo. ¿Continuar?")) return;
      state.storage = backup.storage || {};
      state.history = backup.history || [];
      state.detailSession = null;
      state.editSet = null;
      localStorage.setItem("deiviazo-v1-storage", JSON.stringify(state.storage));
      localStorage.setItem("deiviazo-v1-history", JSON.stringify(state.history));
      alert("Copia importada correctamente.");
      render();
    } catch(e) {
      alert("No se pudo leer la copia. Revisa que sea el JSON exportado por la app.");
    }
  };
  reader.readAsText(file);
}

function selCount(d) {
  return ROUTINE[d].groups.flatMap(g=>g.exercises).filter(ex => {
    const data = state.storage[d+"||"+ex];
    return (data && data.sel) || ex.includes("★");
  }).length;
}

function getExData(dayKey, exName) {
  return state.storage[dayKey+"||"+exName] || {sel:false, sets:[]};
}

function getLastMark(exName) {
  for (let i = state.history.length - 1; i >= 0; i--) {
    const session = state.history[i];
    const exData = session.snapshot && session.snapshot[exName];
    if (!exData || !exData.sets || !exData.sets.length) continue;
    const best = exData.sets.reduce((a, s) => {
      const score = (Number(s.weight) || 0) * (Number(s.reps) || 0);
      return score > a.score ? {...s, score} : a;
    }, {score:-1});
    return {
      dateLabel: session.dateLabel,
      dayLabel: session.dayLabel,
      weight: best.weight || 0,
      reps: best.reps || 0,
      doneSets: best.doneSets || "",
      totalSets: exData.sets.length,
      totalVol: exData.totalVol || 0,
    };
  }
  return null;
}

function getPersonalRecords() {
  const records = {};
  state.history.forEach(session => {
    Object.entries(session.snapshot || {}).forEach(([exName, exData]) => {
      (exData.sets || []).forEach(set => {
        const weight = Number(set.weight) || 0;
        const reps = Number(set.reps) || 0;
        if (!weight && !reps) return;
        const score = weight * reps;
        const current = records[exName];
        if (!current || weight > current.maxWeight || score > current.bestScore) {
          records[exName] = {
            exName,
            maxWeight: Math.max(weight, current?.maxWeight || 0),
            bestWeight: !current || score > current.bestScore ? weight : current.bestWeight,
            bestReps: !current || score > current.bestScore ? reps : current.bestReps,
            bestScore: Math.max(score, current?.bestScore || 0),
            dateLabel: !current || score > current.bestScore ? session.dateLabel : current.dateLabel,
            dayLabel: !current || score > current.bestScore ? session.dayLabel : current.dayLabel,
          };
        }
      });
    });
  });
  return Object.values(records).sort((a,b) => b.bestScore - a.bestScore);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e[k.toLowerCase()] = v;
      else if (k === "className") e.className = v;
      else e.setAttribute(k, v);
    }
  }
  for (const child of children) {
    if (child == null || child === false) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(child));
    else if (child instanceof Node) e.appendChild(child);
  }
  return e;
}

function div(style, ...children) { return el("div", {style}, ...children); }
function span(style, text) { return el("span", {style}, text); }
function p(style, ...children) { return el("p", {style}, ...children); }
function btn(style, text, onClick) {

      reps: rInp.value.trim(),
      doneSets: dInp.value.trim(),
    } : s);
    state.storage[edit.dayKey+"||"+edit.exName] = {...current, sel:true, sets:newSets};
    state.editSet = null;
    saveToStorage();
    render();
  };

  const actions = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginTop:"4px"});
  const cancelBtn = btn({background:C.bg,border:`1px solid ${C.border}`,borderRadius:"10px",color:C.muted,fontSize:"13px",fontWeight:"900",padding:"14px",cursor:"pointer",letterSpacing:"0.08em"},"CANCELAR",()=>{state.editSet=null;render();});
  const saveBtn = btn({background:cfg.color,border:"none",borderRadius:"10px",color:"#fff",fontSize:"13px",fontWeight:"900",padding:"14px",cursor:"pointer",letterSpacing:"0.08em"},"GUARDAR",save);
  cancelBtn.type = "button"; saveBtn.type = "button";
  saveBtn.className = "primary-action";
  actions.appendChild(cancelBtn);
  actions.appendChild(saveBtn);
  panel.appendChild(actions);

  overlay.appendChild(panel);
  setTimeout(() => wInp.focus(), 60);
  return overlay;
}

function renderSessionDetail(session) {
  const cfg = ROUTINE[session.dayKey];
  const totalVol = Object.values(session.snapshot).reduce((a,e)=>a+e.totalVol,0);
  const overlay = div({position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",zIndex:"200",overflowY:"auto",padding:"20px 16px"});
  const inner = div({maxWidth:"520px",margin:"0 auto"});
  const hdr = div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"});
  const hdrLeft = div({});
  const hdrTop = div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"});
  hdrTop.appendChild(span({background:cfg.color,borderRadius:"5px",fontSize:"10px",fontWeight:"900",color:"#fff",padding:"3px 8px",letterSpacing:"0.1em"}, session.dayLabel));
  hdrTop.appendChild(span({fontSize:"15px",fontWeight:"700",color:C.text}, session.dateLabel));
  hdrLeft.appendChild(hdrTop);
  hdrLeft.appendChild(p({margin:"0",fontSize:"11px",color:C.muted}, `${Object.keys(session.snapshot).length} ejercicios · ${totalVol.toFixed(0)} kg·rep`));
  const closeBtn = btn({background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,fontSize:"18px",width:"34px",height:"34px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}, "×", () => { state.detailSession=null; render(); });
  hdr.appendChild(hdrLeft); hdr.appendChild(closeBtn);
  inner.appendChild(hdr);
  Object.entries(session.snapshot).forEach(([exName,exData]) => {
    const exCard = div({background:C.surface,border:`1px solid ${cfg.color}25`,borderRadius:"10px",padding:"13px 14px",marginBottom:"10px"});
    const exHdr = div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"});
    exHdr.appendChild(p({margin:"0",fontSize:"13px",fontWeight:"600",color:C.text,flex:"1",paddingRight:"8px"}, exName.replace(" ★","")));
    if(exData.totalVol>0) exHdr.appendChild(span({fontSize:"10px",color:cfg.color,fontWeight:"700",flexShrink:"0",opacity:"0.8"}, `${exData.totalVol.toFixed(0)} kg·r`));
    exCard.appendChild(exHdr);
    const tHdr = div({display:"grid",gridTemplateColumns:"22px 1fr 1fr 1fr",gap:"5px",marginBottom:"6px"});
    ["SERIE","PESO","REPS","HECHAS"].forEach(h=>tHdr.appendChild(span({fontSize:"8px",fontWeight:"800",color:C.muted,letterSpacing:"0.12em",textAlign:"center"},h)));
    exCard.appendChild(tHdr);
    exData.sets.forEach((s,i)=>{
      const row=div({display:"grid",gridTemplateColumns:"22px 1fr 1fr 1fr",gap:"5px",marginBottom:"4px"});
      row.appendChild(span({fontSize:"12px",color:C.muted,textAlign:"center",fontWeight:"700"},String(i+1)));
      row.appendChild(span({fontSize:"13px",color:s.weight?C.text:C.muted,textAlign:"center",fontWeight:s.weight?"600":"400"},s.weight?`${s.weight} kg`:"—"));
      row.appendChild(span({fontSize:"13px",color:s.reps?C.text:C.muted,textAlign:"center",fontWeight:s.reps?"600":"400"},s.reps?`${s.reps} reps`:"—"));
      row.appendChild(span({fontSize:"13px",color:s.doneSets?C.text:C.muted,textAlign:"center",fontWeight:s.doneSets?"600":"400"},s.doneSets||"—"));
      exCard.appendChild(row);
    });
    inner.appendChild(exCard);
  });
  inner.appendChild(btn({width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",color:C.muted,fontSize:"13px",fontWeight:"700",padding:"13px",cursor:"pointer",marginTop:"6px",letterSpacing:"0.05em"}, "← VOLVER", () => { state.detailSession=null; render(); }));
  overlay.appendChild(inner);
  return overlay;
}

function renderHistory() {
  if (state.detailSession) return renderSessionDetail(state.detailSession);
  const renderBackupTools = () => {
    const box = div({background:C.surface,border:`1px solid ${C.pull}33`,borderRadius:"12px",padding:"13px",marginBottom:"18px"});
    box.className = "glass-card";
    box.appendChild(p({margin:"0 0 10px",fontSize:"10px",fontWeight:"900",color:C.muted,letterSpacing:"0.16em"},"COPIA DE SEGURIDAD"));
    const actions = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px"});
    const exportBtn = btn({background:C.bg,border:`1px solid ${C.pull}55`,borderRadius:"9px",color:C.pull,fontSize:"11px",fontWeight:"900",padding:"12px 8px",cursor:"pointer",letterSpacing:"0.06em"},"EXPORTAR",exportBackup);
    exportBtn.className = "primary-action";
    const importLabel = el("label", {style:{background:C.bg,border:`1px solid ${C.border}`,borderRadius:"9px",color:C.muted,fontSize:"11px",fontWeight:"900",padding:"12px 8px",cursor:"pointer",letterSpacing:"0.06em",textAlign:"center",display:"block"}}, "IMPORTAR");
    importLabel.className = "primary-action";
    const importInput = el("input", {type:"file",accept:"application/json,.json",style:{display:"none"}});
    importInput.onchange = e => {
      importBackupFile(e.target.files && e.target.files[0]);
      e.target.value = "";
    };
    importLabel.appendChild(importInput);
    actions.appendChild(exportBtn);
    actions.appendChild(importLabel);
    box.appendChild(actions);
    box.appendChild(p({margin:"10px 0 0",fontSize:"11px",color:C.muted,lineHeight:"1.45"},"Guarda el JSON en Archivos o iCloud Drive para recuperar tu historial si cambias de móvil."));
    return box;
  };
  const renderPersonalRecords = () => {
    const records = getPersonalRecords();
    if (!records.length) return null;
    const box = div({marginBottom:"24px"});
    const head = div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"9px"});
    head.appendChild(p({margin:"0",fontSize:"10px",fontWeight:"800",color:C.muted,letterSpacing:"0.16em"},"RÉCORDS PERSONALES"));
    head.appendChild(span({fontSize:"10px",color:C.pull,fontWeight:"800"}, `${records.length} ejercicios`));
    box.appendChild(head);
    const list = div({display:"grid",gap:"8px"});
    records.forEach(record => {
      const card = div({background:C.surface,border:`1px solid ${C.pull}25`,borderRadius:"10px",padding:"11px 13px"});
      card.className = "record-card glass-card";
      const title = div({display:"flex",justifyContent:"space-between",gap:"10px",alignItems:"flex-start",marginBottom:"7px"});
      title.appendChild(p({margin:"0",fontSize:"13px",fontWeight:"800",color:C.text,lineHeight:"1.35",flex:"1"}, record.exName.replace(" ★","")));
      title.appendChild(span({fontSize:"9px",fontWeight:"900",letterSpacing:"0.12em",color:C.pull,border:`1px solid ${C.pull}44`,borderRadius:"4px",padding:"2px 6px",flexShrink:"0"},"PR"));
      card.appendChild(title);
      const grid = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px"});
      const maxBox = div({background:C.bg,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px"},
        p({margin:"0 0 3px",fontSize:"8px",fontWeight:"900",letterSpacing:"0.12em",color:C.muted},"MÁX PESO"),
        p({margin:"0",fontSize:"15px",fontWeight:"900",color:C.text}, `${record.maxWeight} kg`)
      );
      maxBox.className = "metric-box";
      grid.appendChild(maxBox);
      const bestBox = div({background:C.bg,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px"},
        p({margin:"0 0 3px",fontSize:"8px",fontWeight:"900",letterSpacing:"0.12em",color:C.muted},"MEJOR SERIE"),
        p({margin:"0",fontSize:"15px",fontWeight:"900",color:C.text}, `${record.bestWeight} x ${record.bestReps}`)
      );
      bestBox.className = "metric-box";
      grid.appendChild(bestBox);
      card.appendChild(grid);
      card.appendChild(p({margin:"7px 0 0",fontSize:"10px",color:C.muted}, `Volumen serie: ${record.bestScore.toFixed(0)} kg·rep · ${record.dateLabel}`));
      list.appendChild(card);
    });
    box.appendChild(list);
    return box;
  };
  const renderHistoryModeTabs = () => {
    const tabs = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"18px"});
    [
      ["sessions","SESIONES"],
      ["records","RÉCORDS"],
    ].forEach(([mode,label]) => {
      const active = state.historyMode === mode;
      const b = btn({background:active?C.pull:C.surface,border:`1.5px solid ${active?C.pull:C.border}`,borderRadius:"10px",color:active?"#fff":C.muted,fontSize:"11px",fontWeight:"900",padding:"11px 8px",cursor:"pointer",letterSpacing:"0.1em"}, label, () => {
        state.historyMode = mode;
        render();
      });
      tabs.appendChild(b);
    });
    return tabs;
  };
  if (!state.history.length) {
    const empty = div({padding:"20px 14px 60px"});
    empty.appendChild(renderBackupTools());
    empty.appendChild(div({padding:"40px 20px",textAlign:"center"},
      p({fontSize:"40px",margin:"0 0 16px"}, "📊"),
      p({color:C.muted,fontSize:"13px",lineHeight:"1.8",margin:"0"}, "Aún no hay sesiones guardadas.")
    ));
    return empty;
  }
  const wrap = div({padding:"20px 14px"});
  wrap.appendChild(renderBackupTools());
  wrap.appendChild(renderHistoryModeTabs());
  if (state.historyMode === "records") {
    const records = renderPersonalRecords();
    if (records) wrap.appendChild(records);
    return wrap;
  }
  const counters = div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"26px"});
  DAYS.forEach(d=>{
    const r=ROUTINE[d]; const n=state.history.filter(s=>s.dayKey===d).length;
    const box=div({background:C.surface,border:`1px solid ${r.color}33`,borderRadius:"12px",padding:"16px 8px",textAlign:"center"});
    box.className = "glass-card";
    box.appendChild(p({margin:"0 0 4px",fontSize:"28px",fontWeight:"900",color:r.color,lineHeight:"1"},String(n)));
    box.appendChild(p({margin:"0",fontSize:"9px",color:C.muted,letterSpacing:"0.14em"},r.label));
    counters.appendChild(box);
  });
  wrap.appendChild(counters);

  wrap.appendChild(p({margin:"0 0 8px",fontSize:"10px",fontWeight:"800",color:C.muted,letterSpacing:"0.16em"},"SESIONES GUARDADAS"));
  [...state.history].reverse().forEach((session,idx)=>{
    const cfg=ROUTINE[session.dayKey];
    const exCount=Object.keys(session.snapshot).length;
    const totalS=Object.values(session.snapshot).reduce((a,e)=>a+e.sets.length,0);
    const sesNum=state.history.length-idx;
    const card=div({background:C.surface,border:`1px solid ${cfg.color}25`,borderRadius:"10px",marginBottom:"8px",overflow:"hidden"});
    card.className = "session-card glass-card";
    const cardHdr=div({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",cursor:"pointer"});
    cardHdr.onclick=()=>{state.detailSession=session;render();};
    const left=div({});
    const topRow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"});
    topRow.appendChild(span({background:cfg.color,borderRadius:"4px",fontSize:"9px",fontWeight:"900",color:"#fff",padding:"2px 6px",letterSpacing:"0.1em"},session.dayLabel));
    topRow.appendChild(span({fontSize:"13px",color:C.dimText},session.dateLabel));
    left.appendChild(topRow);
    left.appendChild(p({margin:"0",fontSize:"11px",color:C.muted},`${exCount} ejercicios · ${totalS} series`));
    cardHdr.appendChild(left);
    cardHdr.appendChild(span({fontSize:"12px",color:cfg.color,fontWeight:"700"},"Ver →"));
    card.appendChild(cardHdr);
    const foot=div({borderTop:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"flex-end"});
    const delBtn=btn({background:"transparent",border:`1px solid ${C.border}`,borderRadius:"6px",color:C.muted,fontSize:"10px",padding:"4px 10px",cursor:"pointer",letterSpacing:"0.06em"},"BORRAR",e=>{
      e.stopPropagation();
      state.history=state.history.filter(s=>s.id!==session.id);
      saveHistoryToStorage();render();
    });
    foot.appendChild(delBtn);
    card.appendChild(foot);
    wrap.appendChild(card);
  });
  return wrap;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const cfg = state.tab !== "history" ? ROUTINE[state.tab] : null;

  const globalPattern = div({position:"fixed",inset:"0",backgroundImage:`url(${PATTERN_IMG})`,backgroundRepeat:"repeat",backgroundSize:"220px",opacity:"0.18",zIndex:"0",pointerEvents:"none"});
  app.appendChild(globalPattern);

  const root = div({position:"relative",zIndex:"1",minHeight:"100vh"});

  const headerBg = cfg ? `linear-gradient(155deg,${cfg.bg} 0%,#0f1117 80%)` : "#0f1117";
  const header = div({background:headerBg,padding:"18px 16px 0",position:"sticky",top:"0",zIndex:"20",borderBottom:`1px solid ${C.border}`,overflow:"hidden"});
  header.className = "app-header";
  const headerArt = div({position:"absolute",inset:"0",backgroundImage:`linear-gradient(90deg,rgba(15,17,23,.98) 0%,rgba(15,17,23,.78) 38%,rgba(15,17,23,.62) 100%),url(${HEADER_BG_IMG})`,backgroundSize:"cover",backgroundPosition:"center",opacity:"0.56",zIndex:"0",pointerEvents:"none"});
  header.appendChild(headerArt);
  const headerInner = div({maxWidth:"520px",margin:"0 auto",position:"relative",zIndex:"1"});

  const topRow = div({display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"16px",gap:"12px"});
  const titleCol = div({flex:"1"});
  const h1 = document.createElement("h1");
  h1.style.cssText = `margin:0;font-size:22px;font-weight:900;letter-spacing:0.06em;color:${C.text}`;
  h1.innerHTML = `RUTINA <span style="color:${cfg?.color||C.pull}">DEIVIAZO</span>`;
  titleCol.appendChild(h1);
  titleCol.appendChild(p({margin:"2px 0 0",fontSize:"10px",color:C.muted,letterSpacing:"0.16em"},"MAQUINAS · MANCUERNAS · POLEAS · BARRA"));
  if (state.autoSaved) titleCol.appendChild(span({fontSize:"10px",color:C.green,fontWeight:"800",letterSpacing:"0.1em",display:"block",marginTop:"6px"},"✓ GUARDADO"));

  const girlImg = document.createElement("img");
  girlImg.src = GIRL_IMG;
  girlImg.alt = "Rutina Deiviazo";
  Object.assign(girlImg.style, {height:"110px",width:"85px",display:"block",borderRadius:"10px",border:`2px solid ${cfg?.color||C.border}`,flexShrink:"0",objectFit:"cover",objectPosition:"center top"});

  topRow.appendChild(titleCol); topRow.appendChild(girlImg);
  headerInner.appendChild(topRow);

  const tabs = div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 42px",gap:"8px",paddingBottom:"14px"});
  DAYS.forEach(d=>{
    const r=ROUTINE[d]; const on=state.tab===d; const n=selCount(d);
    const b=document.createElement("button");
    Object.assign(b.style,{background:on?r.color:C.surface,border:`1.5px solid ${on?r.color:C.border}`,borderRadius:"10px",color:on?"#fff":C.muted,cursor:"pointer",padding:"9px 4px 7px",fontWeight:"900",fontSize:"12px",letterSpacing:"0.1em",transition:"all 0.2s",lineHeight:"1.3"});
    b.className = "tab-tap";
    b.innerHTML=r.label+(n>0?`<div style="font-size:9px;font-weight:600;opacity:${on?0.8:0.5};letter-spacing:0.04em;margin-top:2px">${n} ej.</div>`:"");
    b.onclick=()=>{state.tab=d;state.openTip=null;render();};
    tabs.appendChild(b);
  });
  const histBtn=btn({background:state.tab==="history"?`${C.pull}22`:C.surface,border:`1.5px solid ${state.tab==="history"?C.pull:C.border}`,borderRadius:"10px",color:state.tab==="history"?C.pull:C.muted,cursor:"pointer",fontSize:"16px",transition:"all 0.2s"},"📊",()=>{state.tab="history";render();});
  histBtn.className = "tab-tap";
  tabs.appendChild(histBtn);
  headerInner.appendChild(tabs);
  header.appendChild(headerInner);
  root.appendChild(header);

  const content = div({maxWidth:"520px",margin:"0 auto"});
  content.className = "view-fade";

  if (state.tab === "history") {
    content.appendChild(renderHistory());
  } else {
    const dayWrap = div({padding:"20px 15px 0"});
    const dayHdr = div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"});
    const dayTitle = div({});
    const h2 = document.createElement("h2");
    Object.assign(h2.style,{margin:"0",fontSize:"18px",fontWeight:"900",color:cfg.color,letterSpacing:"0.05em"});
    h2.textContent = `DÍA DE ${cfg.label}`;
    dayTitle.appendChild(h2);
    dayTitle.appendChild(p({margin:"3px 0 0",fontSize:"10px",color:C.muted,letterSpacing:"0.12em"},cfg.subtitle.toUpperCase()));
    const clearBtn=btn({background:"transparent",border:`1px solid ${C.border}`,borderRadius:"7px",color:C.muted,fontSize:"10px",padding:"6px 10px",cursor:"pointer",letterSpacing:"0.06em"},"LIMPIAR DÍA",()=>{
      if(!confirm("¿Borrar los datos actuales de este día?"))return;
      ROUTINE[state.tab].groups.forEach(g=>g.exercises.forEach(ex=>delete state.storage[state.tab+"||"+ex]));
      state.openTip=null;saveToStorage();render();
    });
    dayHdr.appendChild(dayTitle);dayHdr.appendChild(clearBtn);
    dayWrap.appendChild(dayHdr);

    cfg.groups.forEach(group=>{
      const groupDiv=div({marginBottom:"28px"});
      const groupHdr=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"});
      const groupLeft=div({display:"flex",alignItems:"baseline",gap:"10px"});
      const gh=document.createElement("h3");
      Object.assign(gh.style,{margin:"0",fontSize:"10px",fontWeight:"900",letterSpacing:"0.18em",color:cfg.color});
      gh.textContent=group.name;
      groupLeft.appendChild(gh);
      groupLeft.appendChild(span({fontSize:"10px",color:C.muted,letterSpacing:"0.04em"},`— ${group.rec}`));
      groupHdr.appendChild(groupLeft);
      const tipBtn=btn({background:state.openTip===group.name?`${cfg.color}22`:"transparent",border:`1px solid ${cfg.color}44`,borderRadius:"6px",color:state.openTip===group.name?cfg.color:C.muted,fontSize:"11px",padding:"3px 8px",cursor:"pointer"},"💡 Orden",()=>{state.openTip=state.openTip===group.name?null:group.name;render();});
      groupHdr.appendChild(tipBtn);
      groupDiv.appendChild(groupHdr);
      if(state.openTip===group.name){
        groupDiv.appendChild(div({background:C.surface,border:`1px solid ${cfg.color}33`,borderLeft:`3px solid ${cfg.color}`,borderRadius:"8px",padding:"11px 13px",fontSize:"13px",color:C.dimText,lineHeight:"1.6",marginBottom:"12px"},group.tip));
      }
      group.exercises.forEach(ex=>groupDiv.appendChild(renderExerciseCard(ex,state.tab,cfg.color)));
      dayWrap.appendChild(groupDiv);
    });

    const savePad=div({paddingBottom:"32px"});
    if(state.sesFlash){
      const flash = div({background:"#34d39914",border:"1px solid #34d39955",borderRadius:"12px",padding:"16px",textAlign:"center",fontSize:"13px",color:C.green,fontWeight:"900",letterSpacing:"0.05em"},"✓ Sesión guardada — revísala en 📊");
      flash.className = "saved-flash";
      savePad.appendChild(flash);
    } else {
      const saveBtn=btn({width:"100%",background:C.surface,border:`1.5px solid ${cfg.color}55`,borderRadius:"10px",color:cfg.color,fontSize:"13px",fontWeight:"800",padding:"14px",cursor:"pointer",letterSpacing:"0.06em",transition:"all 0.2s"},"💾  GUARDAR SESIÓN EN EL HISTORIAL",()=>{
        const snapshot={};
        cfg.groups.forEach(g=>g.exercises.forEach(ex=>{
          const d=getExData(state.tab,ex);
          if((d?.sel||ex.includes("★"))&&d?.sets?.length){
            const valid=d.sets.filter(s=>s.weight||s.reps);
            if(valid.length)snapshot[ex]={sets:valid.map(s=>({weight:parseFloat(String(s.weight).replace(",", "."))||0,reps:parseFloat(String(s.reps).replace(",", "."))||0,doneSets:s.doneSets||s.note||""})),maxWeight:Math.max(...valid.map(s=>parseFloat(String(s.weight).replace(",", "."))||0)),totalVol:valid.reduce((a,s)=>a+(parseFloat(String(s.weight).replace(",", "."))||0)*(parseFloat(String(s.reps).replace(",", "."))||0),0)};
          }
        }));
        if(!Object.keys(snapshot).length){alert("No hay series con datos para guardar.");return;}
        const now=new Date();
        state.history.push({id:now.getTime(),date:now.toISOString().split("T")[0],dateLabel:now.toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"2-digit"}),dayKey:state.tab,dayLabel:cfg.label,snapshot});
        saveHistoryToStorage();
        state.sesFlash=true;render();
        setTimeout(()=>{state.sesFlash=false;render();},2500);
      });
      saveBtn.className = "primary-action save-button";
      savePad.appendChild(saveBtn);
    }
    dayWrap.appendChild(savePad);
    content.appendChild(dayWrap);
  }

  root.appendChild(content);
  app.appendChild(root);
  if (state.editSet) {
    const editor = renderSetEditor();
    if (editor) app.appendChild(editor);
  }
}

loadFromStorage();
render();

</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
}
</script>
</body>
